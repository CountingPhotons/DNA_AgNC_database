<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="pageTitle">Material — FluorDB</title>
  <link rel="stylesheet" href="static/css/style.css">
  <script src="static/js/vendor/chart.umd.js"></script>
  <script src="static/js/vendor/jszip.min.js"></script>
  <script src="static/js/common.js"></script>
</head>
<body>
  <nav>
    <a href="index.html" class="nav-brand">
      <div class="logo-mark"></div>
      <span>DNA-AgNC <span class="accent">DB</span></span>
    </a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="library.html">Library</a>
      <a href="spectra.html">Spectra Viewer</a>
      <a href="https://huggingface.co/spaces/CoppLab/NucleoSpec" target="_blank" class="nav-pill">Mass Spec Analysis</a>
    </div>
  </nav>

  <main id="mainContent">
    <p class="muted">Loading…</p>
  </main>

  <footer>
    DNA-AgNC DB — DNA-Stabilized Silver Nanocluster Database &nbsp;·&nbsp;
    read-only public mirror &nbsp;·&nbsp; data published as static JSON
  </footer>

  <script>
    let material = null;
    let allMaterialsCache = [];

    function getSlug() {
      const params = new URLSearchParams(window.location.search);
      return params.get('slug');
    }

    function propCell(label, value, big, color) {
      const style = (big ? 'class="prop-value big"' : 'class="prop-value"') +
                    (color ? ` style="color:${color};"` : '');
      return `<div class="prop-cell"><div class="prop-label">${label}</div><div ${style}>${value}</div></div>`;
    }

    function render(m) {
      document.getElementById('pageTitle').textContent = m.name + ' — FluorDB';

      let emissionHTML = m.emission_max
        ? `<span style="color:${nmColor(m.emission_max)};">${Math.round(m.emission_max)}</span> <span style="font-size:0.65em;opacity:0.6;">nm</span>`
        : '—';
      if (m.emission_max_2) {
        emissionHTML += ` <span style="font-size:0.7em;opacity:0.4;">/</span> <span style="color:${nmColor(m.emission_max_2)};">${Math.round(m.emission_max_2)}</span> <span style="font-size:0.65em;opacity:0.6;">nm</span>`;
      }

      const hasSpectra = m.ab_spectrum || m.em_spectrum;

      document.getElementById('mainContent').innerHTML = `
        <div class="detail-header">
          <div class="breadcrumb"><a href="index.html">Home</a> / <a href="library.html">Library</a> / ${m.name}</div>
          <h1>${m.name}</h1>
          <div class="sub">
            ${m.cluster_size ? `<span class="tag tag-cat">Ag<sub>${m.cluster_size}</sub></span>` : ''}
            <span style="color:var(--text-dim);">ID: ${m.id}</span>
          </div>
        </div>

        <div class="actions-row">
          ${hasSpectra ? `<button class="btn btn-ghost" onclick="downloadSpectraZip()">⬇ Spectra ZIP</button>` : ''}
        </div>

        <div class="detail-grid">
          <div>
            ${m.description ? `<div class="description-block">${m.description}</div>` : ''}
            ${m.dna_sequence ? `
              <div class="dna-block">
                <div class="dna-label">DNA Scaffold Sequence (5'→3')</div>
                ${m.dna_sequence}
              </div>` : ''}

            <div class="props-grid">
              ${propCell('Absorption max (Highest non-DNA absorption peak)', m.absorption_max ? `${Math.round(m.absorption_max)} <span style="font-size:0.65em;opacity:0.6;">nm</span>` : '—', true, nmColor(m.absorption_max))}
              ${propCell('Emission max', emissionHTML, true)}
              ${propCell('Cluster Size (N)', m.cluster_size ? `Ag<sub>${m.cluster_size}</sub>` : '—')}
              ${propCell('Valence Number (N₀)', m.valence_number != null ? m.valence_number : '—')}
              ${propCell('Quantum Yield (Φ)', m.quantum_yield != null ? m.quantum_yield.toFixed(3) : '—')}
              ${propCell('Fluorescence Lifetime (ns)', irfShort(m.lifetime_ns))}
              ${propCell('Long-lived Lifetime (us)', irfShort(m.lifetime_us))}
              ${propCell('Solvent / Buffer', m.solvent ? chemNotation(m.solvent) : '—')}
              ${propCell('Purification Method', m.purification_method || '—')}
              ${propCell('Chemical Formula', m.mass_formula ? chemNotation(m.mass_formula) : '—')}
              ${propCell('Compositional Formula', m.molecular_weight ? chemNotation(m.molecular_weight) : '—')}
            </div>

            ${hasSpectra ? `
            <div class="chart-card detail">
              <h3>Absorption &amp; Emission Spectra</h3>
              <div class="chart-container detail"><canvas id="spectrumChart"></canvas></div>
            </div>` : ''}

            <div class="chart-card detail">
              <h3>Family Tree</h3>
              <div class="family-tree-sub">Lineage based on the "Parent Cluster" field · click a node to open it</div>
              <div class="family-tree-scroll" id="familyTreeScroll"><!-- populated by JS --></div>
            </div>
          </div>

          <aside>
            <div class="sidebar-card">
              <h3>References</h3>
              ${(function() {
                const refs = getReferences(m);
                if (!refs.length) return '<div style="color:var(--text-dim);font-size:0.78rem;">No references added.</div>';
                return refs.map((ref, i) =>
                  `<div style="margin-bottom:0.75rem;${i > 0 ? 'padding-top:0.75rem;border-top:1px solid var(--border);' : ''}">
                    ${ref.header ? `<div class="ref-header">${ref.header}</div>` : ''}
                    ${ref.doi
                      ? `<a href="https://doi.org/${ref.doi}" target="_blank" style="color:var(--accent); font-size:0.82rem; line-height:1.5; text-decoration:none;">${ref.citation || ref.doi}</a>`
                      : ref.citation
                        ? `<span style="font-size:0.82rem; line-height:1.5; color:var(--text);">${ref.citation}</span>`
                        : ''}
                  </div>`
                ).join('');
              })()}
              <div class="meta-row" style="display:block; margin-top:0.6rem; padding-top:0.6rem; border-top:1px solid var(--border);">
                <div class="ref-header" style="margin-bottom:0.3rem;">Protein Data Bank</div>
                ${m.pdb_link
                  ? `<a href="${m.pdb_link}" target="_blank" style="color:var(--accent); font-size:0.8rem; text-decoration:none; word-break:break-all;">${m.pdb_link}</a>`
                  : `<span style="color:var(--text-dim); font-size:0.78rem;">No PDB entry linked.</span>`}
              </div>
            </div>

            ${m.notes ? `
            <div class="sidebar-card">
              <h3>Notes</h3>
              <p style="font-size:0.82rem; color:var(--text); line-height:1.7;">${m.notes}</p>
            </div>` : ''}

            <div class="sidebar-card">
              <h3>Record</h3>
              <div class="meta-row"><span class="meta-key">Added</span><span class="meta-val">${(m.created_at || '').slice(0, 10)}</span></div>
              <div class="meta-row"><span class="meta-key">Updated</span><span class="meta-val">${(m.updated_at || '').slice(0, 10)}</span></div>
            </div>
          </aside>
        </div>
      `;

      if (hasSpectra) buildSpectrumChart(m);
      renderFamilyTree(m.slug);
    }

    function buildSpectrumChart(m) {
      const abData = toSortedXY(m.ab_spectrum);
      const emData = toSortedXY(m.em_spectrum);
      const abColor = nmColor(m.absorption_max);
      const emColor = nmColor(m.emission_max);
      const allWl = [];
      if (abData) abData.forEach(p => allWl.push(p.x));
      if (emData) emData.forEach(p => allWl.push(p.x));
      const xMin = allWl.length ? Math.min(...allWl) - 10 : 350;
      const xMax = allWl.length ? Math.max(...allWl) + 10 : 800;

      const datasets = [];
      if (abData) datasets.push({ label:'Absorption', data:abData, borderColor:abColor, backgroundColor:abColor+'20', fill:true, tension:0.4, borderWidth:2, borderDash:[5,3], pointRadius:0 });
      if (emData) datasets.push({ label:'Emission', data:emData, borderColor:emColor, backgroundColor:emColor+'25', fill:true, tension:0.4, borderWidth:2, pointRadius:0 });

      let cursorX = null;
      const crosshairPlugin = {
        id: 'crosshair',
        afterDraw(chart) {
          if (cursorX === null) return;
          const ca = chart.chartArea, ctx = chart.ctx;
          const xScale = chart.scales.x, yScale = chart.scales.y;
          const dataX = xScale.getValueForPixel(cursorX);
          if (dataX < xScale.min || dataX > xScale.max) return;
          ctx.save();
          ctx.beginPath(); ctx.moveTo(cursorX, ca.top); ctx.lineTo(cursorX, ca.bottom);
          ctx.strokeStyle = 'rgba(255,255,255,0.18)'; ctx.lineWidth = 1;
          ctx.setLineDash([4,4]); ctx.stroke(); ctx.setLineDash([]); ctx.restore();
          chart.data.datasets.forEach(ds => {
            const yV = interpY(ds.data, dataX);
            if (yV === null) return;
            const yPx = yScale.getPixelForValue(yV);
            if (yPx < ca.top || yPx > ca.bottom) return;
            ctx.save();
            ctx.beginPath(); ctx.arc(cursorX, yPx, 3.5, 0, Math.PI*2);
            ctx.fillStyle = '#ffffff'; ctx.strokeStyle = '#000000'; ctx.lineWidth = 1.5;
            ctx.fill(); ctx.stroke(); ctx.restore();
          });
        }
      };

      const chart = new Chart(document.getElementById('spectrumChart'), {
        type: 'line', data: { datasets },
        plugins: [crosshairPlugin],
        options: {
          responsive: true, maintainAspectRatio: false, animation: false,
          interaction: { mode: 'none' },
          plugins: {
            legend: { labels: { color:'#6b7585', font:{family:'DM Mono',size:11}, boxWidth:18 } },
            tooltip: { enabled: false }
          },
          scales: {
            x: { type:'linear', min:xMin, max:xMax, title:{display:true,text:'Wavelength (nm)',color:'#6b7585',font:{family:'DM Mono',size:11}}, grid:{color:'#1f2530'}, ticks:{color:'#6b7585',font:{family:'DM Mono',size:10}} },
            y: { min:0, max:1.0, title:{display:true,text:'Normalized Intensity',color:'#6b7585',font:{family:'DM Mono',size:11}}, grid:{color:'#1f2530'}, ticks:{stepSize:0.2,color:'#6b7585',font:{family:'DM Mono',size:10}} }
          }
        }
      });

      const ttEl = document.createElement('div');
      ttEl.style.cssText = "position:absolute;pointer-events:none;opacity:0;transition:opacity 0.1s;background:#111318;border:1px solid #2a3140;border-radius:5px;padding:7px 11px;font-family:'DM Mono',monospace;font-size:11px;color:#6b7585;white-space:nowrap;z-index:100;";
      const wrap = document.getElementById('spectrumChart').parentNode;
      wrap.style.position = 'relative';
      wrap.appendChild(ttEl);

      const canvas = document.getElementById('spectrumChart');
      canvas.addEventListener('mousemove', function(e) {
        const rect = this.getBoundingClientRect();
        const cssX = e.clientX - rect.left;
        const cssY = e.clientY - rect.top;
        const ca = chart.chartArea;
        if (!ca || cssX < ca.left || cssX > ca.right) {
          cursorX = null; ttEl.style.opacity = '0'; chart.render(); return;
        }
        cursorX = cssX;
        const dataX = chart.scales.x.getValueForPixel(cssX);
        const rows = [];
        chart.data.datasets.forEach(ds => {
          const yV = interpY(ds.data, dataX);
          if (yV !== null) rows.push({ label: ds.label, color: ds.borderColor, y: yV });
        });
        if (rows.length) {
          let html = `<div style="color:#e8eaf0;font-weight:500;margin-bottom:4px;">${dataX.toFixed(1)} nm</div>`;
          rows.forEach(r => { html += `<div style="display:flex;align-items:center;gap:6px;margin-bottom:2px;"><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:${r.color};flex-shrink:0;"></span><span>${r.label}: ${r.y.toFixed(3)}</span></div>`; });
          ttEl.innerHTML = html; ttEl.style.opacity = '1';
          const ttW = ttEl.offsetWidth || 160, canW = this.offsetWidth;
          ttEl.style.left = ((cssX + 13 + ttW > canW) ? cssX - ttW - 13 : cssX + 13) + 'px';
          ttEl.style.top = (cssY - 10) + 'px';
        } else { ttEl.style.opacity = '0'; }
        chart.render();
      });
      canvas.addEventListener('mouseleave', function() {
        cursorX = null; ttEl.style.opacity = '0'; chart.render();
      });
    }

    function nmToHexTree(wl) {
      if (!wl) return '#5a6273';
      if (wl < 380) return '#8B00FF';
      if (wl < 450) return '#6600cc';
      if (wl < 495) return '#3355ff';
      if (wl < 510) return '#00BFFF';
      if (wl < 540) return '#00cc66';
      if (wl < 570) return '#99ee00';
      if (wl < 590) return '#FFdd00';
      if (wl < 620) return '#FF8800';
      if (wl < 750) return '#FF2200';
      return '#990000';
    }

    function layoutFamilyTree(forest) {
      const X_SPACING = 140, Y_SPACING = 44;
      const positions = {};
      let yCounter = 0;
      const visiting = new Set();

      function visit(slug, depth) {
        if (visiting.has(slug)) return null;
        visiting.add(slug);
        const children = (forest.childrenOf[slug] || []).filter(c => !visiting.has(c));
        let y;
        if (!children.length) {
          y = yCounter * Y_SPACING;
          yCounter++;
        } else {
          const childYs = [];
          children.forEach(c => { const cy = visit(c, depth + 1); if (cy != null) childYs.push(cy); });
          y = childYs.length ? childYs.reduce((a,b) => a+b, 0) / childYs.length : (yCounter++ * Y_SPACING);
        }
        positions[slug] = { x: depth * X_SPACING, y, depth };
        visiting.delete(slug);
        return y;
      }

      forest.roots.forEach(r => visit(r, 0));
      return positions;
    }

    /** Renders a tree scoped to just this cluster's family (ancestors + all
     *  descendants of the topmost ancestor), with the current cluster
     *  highlighted. Uses allMaterialsCache, fetched once in init(). */
    function renderFamilyTree(currentSlug) {
      const container = document.getElementById('familyTreeScroll');
      if (!container) return;
      const allMaterials = allMaterialsCache;

      const bySlug = {};
      allMaterials.forEach(m => bySlug[m.slug] = m);
      const childrenOf = {};
      allMaterials.forEach(m => {
        const p = m.parent_slug;
        if (p && bySlug[p] && p !== m.slug) (childrenOf[p] = childrenOf[p] || []).push(m.slug);
      });

      const current = bySlug[currentSlug];
      const hasParent   = current && current.parent_slug && bySlug[current.parent_slug];
      const hasChildren = (childrenOf[currentSlug] || []).length > 0;

      if (!hasParent && !hasChildren) {
        container.innerHTML = '<div class="tree-empty">This cluster has no recorded parent or child clusters.</div>';
        return;
      }

      let rootSlug = currentSlug;
      const seenUp = new Set([currentSlug]);
      while (bySlug[rootSlug] && bySlug[rootSlug].parent_slug &&
             bySlug[bySlug[rootSlug].parent_slug] && !seenUp.has(bySlug[rootSlug].parent_slug)) {
        rootSlug = bySlug[rootSlug].parent_slug;
        seenUp.add(rootSlug);
      }

      const relevant = new Set();
      (function collect(slug, seen) {
        if (seen.has(slug)) return;
        seen.add(slug); relevant.add(slug);
        (childrenOf[slug] || []).forEach(c => collect(c, seen));
      })(rootSlug, new Set());

      const scopedChildrenOf = {};
      relevant.forEach(slug => {
        if (childrenOf[slug]) scopedChildrenOf[slug] = childrenOf[slug].filter(c => relevant.has(c));
      });
      const roots = Array.from(relevant).filter(slug => {
        const m = bySlug[slug];
        return !m.parent_slug || !relevant.has(m.parent_slug);
      });

      const positions = layoutFamilyTree({ childrenOf: scopedChildrenOf, roots });
      const slugs = Object.keys(positions);
      const PAD = 28, R = 9;
      const maxX = Math.max(...slugs.map(s => positions[s].x));
      const maxY = Math.max(...slugs.map(s => positions[s].y));
      const width  = Math.max(280, maxX + PAD * 2 + 130);
      const height = Math.max(90, maxY + PAD * 2);

      let svg = `<svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" xmlns="http://www.w3.org/2000/svg">`;

      slugs.forEach(slug => {
        const p = positions[slug];
        (scopedChildrenOf[slug] || []).forEach(childSlug => {
          const c = positions[childSlug];
          if (!c) return;
          const x1 = p.x + PAD, y1 = p.y + PAD, x2 = c.x + PAD, y2 = c.y + PAD;
          const midX = (x1 + x2) / 2;
          svg += `<path class="tree-edge" d="M ${x1} ${y1} C ${midX} ${y1}, ${midX} ${y2}, ${x2} ${y2}" />`;
        });
      });

      slugs.forEach(slug => {
        const m = bySlug[slug];
        const p = positions[slug];
        const cx = p.x + PAD, cy = p.y + PAD;
        const color = nmToHexTree(m.emission_max);
        const isCurrent = slug === currentSlug;

        if (isCurrent) {
          svg += `<circle cx="${cx}" cy="${cy}" r="${R + 6}" fill="none" stroke="var(--accent)" stroke-width="2" opacity="0.55" />`;
          svg += `<circle class="tree-node-circle current" cx="${cx}" cy="${cy}" r="${R}" fill="${color}" stroke="var(--accent)" stroke-width="3"><title>${m.name} (this cluster)</title></circle>`;
          svg += `<text class="tree-node-label" x="${cx + R + 10}" y="${cy + 3}" style="font-weight:700;">${m.name}</text>`;
        } else {
          svg += `<a href="material.html?slug=${encodeURIComponent(slug)}">`;
          svg += `<circle class="tree-node-circle" cx="${cx}" cy="${cy}" r="${R}" fill="${color}"><title>${m.name}</title></circle>`;
          svg += `<text class="tree-node-label" x="${cx + R + 8}" y="${cy + 3}">${m.name}</text>`;
          svg += `</a>`;
        }
      });

      svg += '</svg>';
      container.innerHTML = svg;
    }

    /** Build the absorption/emission CSV zip entirely client-side via JSZip. */
    async function downloadSpectraZip() {
      const base = safeFilenameBase(material.name);
      const zip = new JSZip();
      if (material.ab_spectrum) {
        const csv = 'wavelength,intensity\n' + material.ab_spectrum.map(p => `${p[0]},${p[1]}`).join('\n');
        zip.file(`${base}_absorption.csv`, csv);
      }
      if (material.em_spectrum) {
        const csv = 'wavelength,intensity\n' + material.em_spectrum.map(p => `${p[0]},${p[1]}`).join('\n');
        zip.file(`${base}_emission.csv`, csv);
      }
      const blob = await zip.generateAsync({ type: 'blob' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${base}_spectra.zip`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    async function init() {
      const slug = getSlug();
      if (!slug) {
        document.getElementById('mainContent').innerHTML = '<p class="muted">No material specified.</p>';
        return;
      }
      const all = await fetchJSON('data/materials.json');
      allMaterialsCache = all;
      try {
        material = await fetchJSON(`data/materials/${slug}.json`);
      } catch (e) {
        material = all.find(m => m.slug === slug);
      }
      if (!material) {
        document.getElementById('mainContent').innerHTML = '<p class="muted">Material not found.</p>';
        return;
      }
      render(material);
    }
    init().catch(err => {
      document.getElementById('mainContent').innerHTML =
        `<p class="muted">Could not load data/materials.json (${err.message}). Try a hard refresh (Ctrl+Shift+R).</p>`;
    });
  </script>
</body>
</html>
